name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke-test against real SLSA fixture
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout agent
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 @ 2025-11-13

      # Invoke the action against the real cli/cli attestation fixture
      # that ships with colofon-sdk/test/fixtures. If this step passes,
      # the full pipeline - attestation parse -> witness -> circuit
      # compile -> UltraHonk prove -> bundle serialise - works end-to-
      # end the same way a downstream release workflow would call it.
      # Use actions/checkout with sparse-checkout to fetch just the
      # SLSA fixture from colofon-sdk. Passing the token via the
      # action keeps it out of process args / shell history - it
      # lives only in the checkout's credential helper for the
      # duration of the step.
      - name: Fetch SLSA fixture from colofon-sdk
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 @ 2025-11-13
        with:
          repository: colofonhq/colofon-sdk
          token: ${{ secrets.COLOFON_AGENT_TOKEN }}
          path: .colofon-smoke/sdk
          sparse-checkout: |
            test/fixtures
          sparse-checkout-cone-mode: true

      - name: Stage attestation + builders
        run: |
          cp .colofon-smoke/sdk/test/fixtures/slsa-provenance-bundle-sha256.json attestation.json

          # Approved-builders file: the real cli/cli signer identity
          # plus one other to give the Merkle tree real depth.
          # Building via `{ echo; echo; } > file` avoids indented
          # heredoc bodies leaking leading whitespace into the file.
          {
            echo 'https://github.com/cli/cli/.github/workflows/deployment.yml@refs/heads/trunk'
            echo 'https://github.com/acme/placeholder/.github/workflows/release.yml@refs/heads/main'
          } > builders.txt

      - name: Run colofon-agent
        uses: ./
        with:
          attestation-bundle: attestation.json
          approved-builders-file: builders.txt
          output-path: colofon-bundle.json
          sdk-token: ${{ secrets.COLOFON_AGENT_TOKEN }}

      - name: Sanity-check the generated bundle
        # Shape matches bundle v2 (sdk#29, landed before this workflow
        # was last touched): top-level `version: 2`, `circuits[]` array,
        # each entry with name/bytecodeHash/proof/publicInputs, and
        # bundle-level metadata.binaryDigestSha256 +
        # metadata.signingCertificateDer.
        run: |
          test -s colofon-bundle.json
          node -e '
            const fs = require("fs");
            const b = JSON.parse(fs.readFileSync("colofon-bundle.json", "utf-8"));
            if (b.version !== "2") { console.error("bad version, expected \"2\" got", JSON.stringify(b.version)); process.exit(1); }
            if (!Array.isArray(b.circuits) || b.circuits.length !== 1) {
              console.error("expected exactly 1 circuit entry, got", b.circuits?.length);
              process.exit(1);
            }
            const c = b.circuits[0];
            if (c.name !== "colofon_build_provenance") { console.error("bad circuit name"); process.exit(1); }
            if (!Array.isArray(c.publicInputs) || c.publicInputs.length !== 5) {
              console.error("expected 5 public inputs, got", c.publicInputs?.length);
              process.exit(1);
            }
            if (typeof c.proof !== "string" || c.proof.length === 0) { console.error("missing proof"); process.exit(1); }
            if (typeof c.bytecodeHash !== "string" || !c.bytecodeHash.startsWith("0x")) { console.error("bad bytecodeHash"); process.exit(1); }
            if (b.metadata?.binaryDigestSha256 !== "33502d742261d4af607e48d2420d4fa2a208de9349a327db7fb3b9b4fbe536d0") {
              console.error("unexpected binary digest");
              process.exit(1);
            }
            console.log("bundle sanity check ok");
          '

      - name: Upload bundle as artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 @ 2024-10-10
        with:
          name: colofon-bundle
          path: colofon-bundle.json
